enum NotificationType {
  LIKE_POST
  LIKE_COMMENT
  COMMENT_POST
  REPLY_COMMENT
  FOLLOW_USER
  CLUB_INVITE
  CLUB_ACCEPT
  JOB_APPLICATION_UPDATE
}

type Notification {
  id: ID!
  recipientId: ID!
  actorId: ID!
  type: NotificationType!
  entityId: String
  postId: String
  isRead: Boolean!
  createdAt: String!
  recipient: User!
  actor: User!
  post: Post
}

extend type Query {
  myNotifications(userId: ID!, limit: Int, offset: Int): [Notification!]!
  unreadNotificationsCount(userId: ID!): Int!
}

extend type Mutation {
  markNotificationAsRead(id: ID!): Boolean!
  markAllNotificationsAsRead(userId: ID!): Boolean!
  removeNotification(id: ID!, userId: ID!): Boolean!
  clearAllNotifications(userId: ID!): Boolean!
}
