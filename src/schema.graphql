enum Role {
  PLAYER
  COACH
  CLUB
  SUPERADMIN
}

type User {
  id: ID!
  email: String!
  name: String!
  username: String
  avatar: String
  coverImage: String
  coverImagePosition: String
  bio: String
  position: String
  role: Role!
  country: String
  city: String
  clubId: String
  club: Club
  yearsOfExperience: Int
  cvUrl: String
  multimedia: [String!]!
  dateOfBirth: String
  level: UserLevel
  isVerified: Boolean!
  isEmailVerified: Boolean!
  isActive: Boolean!
  createdAt: String!
  updatedAt: String!
  trajectories: [Trajectory!]!
  savedJobs: [JobOpportunity!]!
  followersCount: Int!
  followingCount: Int!
  likesReceivedCount: Int!
  isFollowedByCurrentUser: Boolean!
  isLikedByCurrentUser: Boolean!
}

type Club {
  id: ID!
  name: String!
  logo: String
  coverImage: String
  coverImagePosition: String
  description: String
  bio: String
  city: String!
  country: String!
  league: String
  foundedYear: Int
  email: String
  phone: String
  website: String
  instagram: String
  twitter: String
  facebook: String
  tiktok: String
  isVerified: Boolean!
  verificationStatus: VerificationStatus!
  verificationDoc: String
  benefits: [String!]!
  videos: [String!]!
  user: User!
  members: [ClubMember!]!
  createdAt: String!
  updatedAt: String!
  followersCount: Int!
  likesReceivedCount: Int!
  isFollowedByCurrentUser: Boolean!
  isLikedByCurrentUser: Boolean!
}

type Team {
  id: ID!
  name: String!
  category: String!
}

type ClubMember {
  id: ID!
  club: Club!
  user: User!
  roleInClub: String!
  role: String!
  status: String!
  joinedAt: String!
  createdAt: String!
}

type JobOpportunity {
  id: ID!
  title: String!
  description: String!
  positionType: String!
  level: String!
  club: Club!
  country: String!
  city: String!
  salary: Float
  currency: String
  benefits: String
  status: String!
  gender: Gender
  expiresAt: String
  division: String
  applications: [JobApplication!]!
  isSavedByCurrentUser: Boolean!
  createdAt: String!
}

type JobApplication {
  id: ID!
  jobOpportunityId: ID!
  userId: ID!
  status: String!
  coverLetter: String
  resumeUrl: String
  appliedAt: String!
  updatedAt: String!
  reviewedAt: String
  reviewedBy: String
  notes: String
  user: User!
  jobOpportunity: JobOpportunity!
}

type Trajectory {
  id: ID!
  userId: ID!
  clubId: ID
  title: String!
  organization: String!
  period: String!
  description: String
  startDate: String
  endDate: String
  isCurrent: Boolean!
  order: Int!
  createdAt: String!
  user: User!
  club: Club
}

input TrajectoryInput {
  id: ID
  clubId: ID
  title: String!
  organization: String!
  period: String!
  description: String
  startDate: String
  endDate: String
  isCurrent: Boolean
  order: Int
}

type Conversation {
  id: ID!
  isGroup: Boolean!
  name: String
  avatar: String
  participants: [ConversationParticipant!]!
  messages: [Message!]!
  createdAt: String!
  updatedAt: String!
}

type ConversationParticipant {
  id: ID!
  conversationId: ID!
  userId: ID!
  lastSeenMessageId: ID
  unreadCount: Int!
  joinedAt: String!
  user: User!
}

type Message {
  id: ID!
  content: String!
  senderId: ID!
  conversationId: ID!
  isRead: Boolean!
  readAt: String
  imageUrl: String
  fileUrl: String
  sender: User!
  createdAt: String!
  updatedAt: String!
}

type PaymentIntent {
  id: ID!
  clientSecret: String
}

"""A view that pairs each Club with its CLUB user."""
type ClubAdminView {
  clubId: ID!
  clubName: String!
  clubCity: String!
  clubCountry: String!
  clubLeague: String
  clubIsVerified: Boolean!
  adminId: ID
  adminName: String
  adminUsername: String
  adminAvatar: String
  adminEmail: String
  adminCountry: String
  adminCity: String
}

type S3PresignedUrl {
  uploadUrl: String!
  finalUrl: String!
}

enum UserLevel {
  PROFESSIONAL
  AMATEUR
}

enum Gender {
  MEN
  WOMEN
  MIXED
}

enum NewsCategory {
  INTERNATIONAL
  NATIONAL
  TRANSFERS
  EQUIPMENT
  RESULTS
}

enum FollowEntityType {
  USER
  CLUB
}

enum LikeEntityType {
  USER
  CLUB
}

enum OAuthProvider {
  GOOGLE
  FACEBOOK
  LINKEDIN
  TWITTER
}

enum VerificationStatus {
  UNVERIFIED
  PENDING
  VERIFIED
  REJECTED
}

type Follow {
  id: ID!
  followerType: FollowEntityType!
  followerId: ID!
  followingType: FollowEntityType!
  followingId: ID!
  createdAt: String!
}

type Like {
  id: ID!
  likerType: LikeEntityType!
  likerId: ID!
  likedType: LikeEntityType!
  likedId: ID!
  createdAt: String!
}

type NewsAuthor {
  name: String!
  avatar: String
}

type NewsArticleSummary {
  id: ID!
  slug: String!
  title: String!
  coverImage: String
  category: NewsCategory!
  publishedAt: String
}

type NewsArticle {
  id: ID!
  slug: String!
  title: String!
  excerpt: String!
  content: String!
  coverImage: String
  category: NewsCategory!
  publishedAt: String
  readingTimeMinutes: Int
  isPublished: Boolean!
  author: NewsAuthor!
  relatedArticles: [NewsArticleSummary!]!
}

type NewsPaginatedResult {
  items: [NewsArticle!]!
  total: Int!
  hasMore: Boolean!
}

type ApplicationWithUser {
  id: ID!
  userId: ID!
  status: String!
  coverLetter: String
  resumeUrl: String
  appliedAt: String!
  updatedAt: String!
  reviewedAt: String
  notes: String
  user: User!
  jobOpportunity: JobOpportunity!
}

input JobOpportunityFiltersInput {
  country: String
  positionType: String
  level: String
  gender: Gender
  search: String
  clubId: ID
  status: String
  division: String
  expiresAfter: String
}

input NewsFiltersInput {
  category: NewsCategory
  search: String
}

input NewsArticleInput {
  slug: String!
  title: String!
  excerpt: String!
  content: String!
  coverImage: String
  category: NewsCategory!
  publishedAt: String
  readingTimeMinutes: Int
  authorName: String
  authorAvatar: String
  relatedSlugs: [String!]
}

input NewsArticleUpdateInput {
  title: String
  excerpt: String
  content: String
  coverImage: String
  category: NewsCategory
  readingTimeMinutes: Int
  relatedSlugs: [String!]
}

type Query {
  # Users
  users: [User!]!
  user(id: ID!): User
  getUserByUsername(username: String!): User
  me(id: ID!): User
  players: [User!]!
  coaches: [User!]!

  # Clubs & Teams
  clubs: [Club!]!
  club(id: ID!): Club
  clubAdmins: [ClubAdminView!]!
  teamsByClub(clubId: ID!): [Team!]!

  # Job Opportunities
  jobOpportunities(
    filters: JobOpportunityFiltersInput
    page: Int
    limit: Int
  ): [JobOpportunity!]!
  jobOpportunity(id: String!): JobOpportunity
  savedJobOpportunities: [JobOpportunity!]!

  # Job Applications
  jobApplications(jobOpportunityId: String!, status: String): [JobApplication!]!
  userApplications(userId: String!, status: String): [JobApplication!]!
  jobApplication(id: String!): JobApplication
  getClubApplications(
    clubId: ID!
    status: String
    page: Int
    limit: Int
  ): [ApplicationWithUser!]!

  # Follows & Likes
  followers(entityType: FollowEntityType!, entityId: ID!): [Follow!]!
  following(entityType: FollowEntityType!, entityId: ID!): [Follow!]!
  profileLikes(entityType: LikeEntityType!, entityId: ID!): [Like!]!
  likesGiven(entityType: LikeEntityType!, entityId: ID!): [Like!]!

  # News
  news(filters: NewsFiltersInput, page: Int, limit: Int): NewsPaginatedResult!
  newsArticle(slug: String!): NewsArticle
  superAdminNewsArticles(filters: NewsFiltersInput, page: Int, limit: Int): NewsPaginatedResult!

  # Messaging
  myConversations(userId: String!): [Conversation!]!
  conversation(id: String!): Conversation
  messages(conversationId: String!): [Message!]!

  # Explore
  exploreUsers(
    role: String
    country: String
    position: String
    level: String
    searchQuery: String
    search: String
    limit: Int
    offset: Int
  ): [User!]!
  exploreClubs(
    country: String
    league: String
    search: String
    limit: Int
    offset: Int
  ): [Club!]!
  availablePositions: [String!]!
  availableLeagues: [String!]!
  availableCountries: [String!]!
}

type Mutation {
  # Auth
  register(
    email: String!
    name: String!
    username: String
    password: String!
    role: String
    country: String
    city: String
    position: String
    dateOfBirth: String
    clubName: String
  ): String!
  login(email: String!, password: String!): String!
  uploadAvatar(userId: ID!, base64: String!): Boolean!
  uploadCoverImage(userId: ID!, base64: String!): Boolean!
  uploadCV(userId: ID!, base64: String!): String!
  deleteCV(userId: ID!): Boolean!
  updateUser(
    id: ID!
    name: String
    username: String
    bio: String
    avatar: String
    coverImage: String
    coverImagePosition: String
    position: String
    country: String
    city: String
    clubId: ID
    yearsOfExperience: Int
    multimedia: [String!]
    cvUrl: String
    dateOfBirth: String
    level: UserLevel
    trajectories: [TrajectoryInput!]
  ): User!

  # Uploads
  getS3PresignedUrl(fileName: String!, contentType: String!): S3PresignedUrl!

  # Clubs
  """Creates the club profile for the authenticated user (must have role CLUB)."""
  createClub(
    name: String!
    city: String!
    country: String!
    location: String
    benefits: [String!]
    instagram: String
    twitter: String
    facebook: String
    tiktok: String
  ): Club!
  """Super admin only: approves a club's verification request."""
  verifyClub(clubId: ID!): Club!
  """Super admin only: sets a club's verification status directly."""
  adminSetClubVerification(clubId: ID!, status: VerificationStatus!): Club!
  createTeam(clubId: String!, name: String!, category: String!): Team!
  invitePlayerToClub(
    clubId: String!
    userId: String!
    invitedBy: String!
  ): ClubMember!
  acceptMembership(membershipId: String!): ClubMember!
  updateClub(
    id: ID!
    name: String
    description: String
    bio: String
    coverImagePosition: String
    league: String
    foundedYear: Int
    email: String
    phone: String
    website: String
    instagram: String
    twitter: String
    facebook: String
    tiktok: String
    benefits: [String!]
    videos: [String!]
  ): Club!
  requestClubVerification(clubId: ID!, documentUrl: String!): Club!
  uploadClubLogo(clubId: ID!, base64: String!): Boolean!
  uploadClubCoverImage(clubId: ID!, base64: String!): Boolean!

  # Job Opportunities
  createJobOpportunity(
    title: String!
    description: String!
    positionType: String!
    level: String!
    clubId: String!
    country: String!
    city: String!
    salary: Float
    currency: String
    benefits: String
    gender: Gender
    expiresAt: String
    division: String
  ): JobOpportunity!
  updateJobOpportunity(id: String!, status: String): JobOpportunity!
  deleteJobOpportunity(id: String!): Boolean!
  saveJobOpportunity(jobOpportunityId: ID!): Boolean!
  unsaveJobOpportunity(jobOpportunityId: ID!): Boolean!

  # Job Applications
  applyForJob(
    jobOpportunityId: String!
    userId: String!
    coverLetter: String
    resumeUrl: String
  ): JobApplication!
  updateApplicationStatus(
    applicationId: ID!
    status: String!
    notes: String
  ): JobApplication!
  withdrawApplication(id: String!, userId: String!): JobApplication!

  # Follows
  follow(
    followerType: FollowEntityType!
    followerId: ID!
    followingType: FollowEntityType!
    followingId: ID!
  ): Follow!
  unfollow(
    followerType: FollowEntityType!
    followerId: ID!
    followingType: FollowEntityType!
    followingId: ID!
  ): Boolean!

  # Likes
  likeProfile(
    likerType: LikeEntityType!
    likerId: ID!
    likedType: LikeEntityType!
    likedId: ID!
  ): Like!
  unlikeProfile(
    likerType: LikeEntityType!
    likerId: ID!
    likedType: LikeEntityType!
    likedId: ID!
  ): Boolean!

  # News (Super Admin only)
  createNewsArticle(input: NewsArticleInput!): NewsArticle!
  updateNewsArticle(id: ID!, input: NewsArticleUpdateInput!): NewsArticle!
  deleteNewsArticle(id: ID!): Boolean!
  publishNewsArticle(id: ID!): NewsArticle!
  unpublishNewsArticle(id: ID!): NewsArticle!

  # Messaging
  startConversation(participantIds: [String!]!): Conversation!
  sendMessage(
    conversationId: String!
    senderId: String!
    content: String!
  ): Message!
  markMessageAsRead(messageId: String!): Boolean!

  # Payments
  createPaymentIntent(amount: Float!, currency: String): PaymentIntent!
}
