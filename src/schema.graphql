type User {
  id: ID!
  email: String!
  name: String!
  username: String
  avatar: String
  coverImage: String
  coverImagePosition: String
  bio: String
  position: String
  role: String!
  country: String
  city: String
  clubId: String
  club: Club
  yearsOfExperience: Int
  cvUrl: String
  multimedia: [String!]!
  level: String!
  isVerified: Boolean!
  isEmailVerified: Boolean!
  isActive: Boolean!
  createdAt: String!
  updatedAt: String!
  trajectories: [Trajectory!]!
}

type Club {
  id: ID!
  name: String!
  logo: String
  coverImage: String
  coverImagePosition: String
  description: String
  bio: String
  city: String!
  country: String!
  league: String
  foundedYear: Int
  email: String
  phone: String
  website: String
  instagram: String
  twitter: String
  facebook: String
  tiktok: String
  isVerified: Boolean!
  verificationStatus: String!
  verificationDoc: String
  benefits: [String!]!
  adminId: ID
  admin: User
  members: [ClubMember!]!
  createdAt: String!
  updatedAt: String!
}

type Team {
  id: ID!
  name: String!
  category: String!
}

type ClubMember {
  id: ID!
  club: Club!
  user: User!
  roleInClub: String!
  role: String!
  status: String!
  joinedAt: String!
  createdAt: String!
}

type JobOpportunity {
  id: ID!
  title: String!
  description: String!
  positionType: String!
  level: String!
  club: Club!
  country: String!
  city: String!
  salary: Float
  currency: String
  benefits: String
  status: String!
  applications: [JobApplication!]!
  createdAt: String!
}

type JobApplication {
  id: ID!
  jobOpportunityId: ID!
  userId: ID!
  status: String!
  coverLetter: String
  resumeUrl: String
  appliedAt: String!
  updatedAt: String!
  reviewedAt: String
  reviewedBy: String
  notes: String
  user: User!
  jobOpportunity: JobOpportunity!
}

type Trajectory {
  id: ID!
  userId: ID!
  clubId: ID
  title: String!
  organization: String!
  period: String!
  description: String
  startDate: String
  endDate: String
  isCurrent: Boolean!
  order: Int!
  createdAt: String!
  user: User!
  club: Club
}

input TrajectoryInput {
  id: ID
  clubId: ID
  title: String!
  organization: String!
  period: String!
  description: String
  startDate: String
  endDate: String
  isCurrent: Boolean
  order: Int
}

type Conversation {
  id: ID!
  isGroup: Boolean!
  name: String
  avatar: String
  participants: [ConversationParticipant!]!
  messages: [Message!]!
  createdAt: String!
  updatedAt: String!
}

type ConversationParticipant {
  id: ID!
  conversationId: ID!
  userId: ID!
  lastSeenMessageId: ID
  unreadCount: Int!
  joinedAt: String!
  user: User!
}

type Message {
  id: ID!
  content: String!
  senderId: ID!
  conversationId: ID!
  isRead: Boolean!
  readAt: String
  imageUrl: String
  fileUrl: String
  sender: User!
  createdAt: String!
  updatedAt: String!
}

type PaymentIntent {
  id: ID!
  clientSecret: String
}

"""A view that pairs each Club with its CLUB_ADMIN user."""
type ClubAdminView {
  clubId: ID!
  clubName: String!
  clubCity: String!
  clubCountry: String!
  clubLeague: String
  clubIsVerified: Boolean!
  adminId: ID
  adminName: String
  adminUsername: String
  adminAvatar: String
  adminEmail: String
  adminCountry: String
  adminCity: String
}

type S3PresignedUrl {
  uploadUrl: String!
  finalUrl: String!
}

type Query {
  # Users
  users: [User!]!
  user(id: ID!): User
  getUserByUsername(username: String!): User
  me(id: ID!): User
  players: [User!]!
  coaches: [User!]!

  # Clubs & Teams
  clubs: [Club!]!
  club(id: ID!): Club
  clubAdmins: [ClubAdminView!]!
  teamsByClub(clubId: ID!): [Team!]!

  # Job Opportunities
  jobOpportunities(
    positionType: String
    level: String
    country: String
    city: String
    status: String
  ): [JobOpportunity!]!
  jobOpportunity(id: String!): JobOpportunity

  # Job Applications
  jobApplications(jobOpportunityId: String!, status: String): [JobApplication!]!
  userApplications(userId: String!, status: String): [JobApplication!]!
  jobApplication(id: String!): JobApplication

  # Messaging
  myConversations(userId: String!): [Conversation!]!
  conversation(id: String!): Conversation
  messages(conversationId: String!): [Message!]!

  # Explore
  exploreUsers(
    role: String
    country: String
    position: String
    level: String
    searchQuery: String
    search: String
    limit: Int
    offset: Int
  ): [User!]!
  exploreClubs(
    country: String
    league: String
    search: String
    limit: Int
    offset: Int
  ): [Club!]!
  availablePositions: [String!]!
  availableLeagues: [String!]!
  availableCountries: [String!]!
}

type Mutation {
  # Auth
  register(
    email: String!
    name: String!
    username: String
    password: String!
    role: String
  ): String!
  login(email: String!, password: String!): String!
  uploadAvatar(userId: ID!, base64: String!): Boolean!
  uploadCoverImage(userId: ID!, base64: String!): Boolean!
  uploadCV(userId: ID!, base64: String!): String!
  deleteCV(userId: ID!): Boolean!
  updateUser(
    id: ID!
    name: String
    username: String
    bio: String
    avatar: String
    coverImage: String
    coverImagePosition: String
    position: String
    country: String
    city: String
    clubId: ID
    yearsOfExperience: Int
    multimedia: [String!]
    cvUrl: String
    trajectories: [TrajectoryInput!]
  ): User!

  # Uploads
  getS3PresignedUrl(fileName: String!, contentType: String!): S3PresignedUrl!

  # Clubs
  createClub(
    name: String!
    city: String!
    country: String!
    adminId: ID!
    location: String
    benefits: [String!]
    instagram: String
    twitter: String
    facebook: String
    tiktok: String
  ): Club!
  createTeam(clubId: String!, name: String!, category: String!): Team!
  invitePlayerToClub(
    clubId: String!
    userId: String!
    invitedBy: String!
  ): ClubMember!
  acceptMembership(membershipId: String!): ClubMember!
  updateClub(
    id: ID!
    name: String
    description: String
    bio: String
    coverImagePosition: String
    league: String
    foundedYear: Int
    email: String
    phone: String
    website: String
    instagram: String
    twitter: String
    facebook: String
    tiktok: String
    benefits: [String!]
  ): Club!
  requestClubVerification(clubId: ID!, documentUrl: String!): Club!
  uploadClubLogo(clubId: ID!, base64: String!): Boolean!
  uploadClubCoverImage(clubId: ID!, base64: String!): Boolean!

  # Job Opportunities
  createJobOpportunity(
    title: String!
    description: String!
    positionType: String!
    level: String!
    clubId: String!
    country: String!
    city: String!
    salary: Float
    currency: String
    benefits: String
  ): JobOpportunity!
  updateJobOpportunity(id: String!, status: String): JobOpportunity!
  deleteJobOpportunity(id: String!): Boolean!

  # Job Applications
  applyForJob(
    jobOpportunityId: String!
    userId: String!
    coverLetter: String
    resumeUrl: String
  ): JobApplication!
  updateApplicationStatus(
    id: String!
    status: String!
    reviewedBy: String
    notes: String
  ): JobApplication!
  withdrawApplication(id: String!, userId: String!): JobApplication!

  # Messaging
  startConversation(participantIds: [String!]!): Conversation!
  sendMessage(
    conversationId: String!
    senderId: String!
    content: String!
  ): Message!
  markMessageAsRead(messageId: String!): Boolean!

  # Payments
  createPaymentIntent(amount: Float!, currency: String): PaymentIntent!
}
