name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint, Generate & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stick_transfer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/stick_transfer_test
      DIRECT_URL: postgresql://test:test@localhost:5432/stick_transfer_test
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run migrations
        run: pnpm exec prisma migrate deploy

      - name: Unit tests
        run: pnpm test -- --passWithNoTests

      - name: E2E tests
        run: echo "No e2e suite configured yet — skipping"
