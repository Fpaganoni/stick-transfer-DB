name: NestJS GraphQL CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    name: 🛠️ Lint, Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Check Code Quality (Lint)
      run: pnpm run lint

    - name: Generate Prisma Client Types
      run: pnpm prisma generate
      env:
        DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
        DIRECT_URL: "postgresql://user:pass@localhost:5432/db?schema=public"

    - name: Run Unit Tests with Coverage
      run: pnpm run test:cov

    - name: Compile Application (Build)
      run: pnpm run build

  integration-tests:
    name: 🗄️ Integration (e2e) & DB Validation
    runs-on: ubuntu-latest
    needs: build-and-test
    
    # Levanta una base de datos PostgreSQL real (efímera) en GitHub Actions para pruebas de Prisma
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cicd_admin
          POSTGRES_PASSWORD: testpassword123
          POSTGRES_DB: hockey_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Mock .env for Testing
      run: |
        echo "DATABASE_URL=postgresql://cicd_admin:testpassword123@localhost:5432/hockey_test_db?schema=public" >> .env
        echo "DIRECT_URL=postgresql://cicd_admin:testpassword123@localhost:5432/hockey_test_db?schema=public" >> .env
        echo "JWT_SECRET=super-secret-test-key-12345" >> .env
        echo "FRONTEND_URL=http://localhost:3000" >> .env

    - name: Generate Prisma Client
      run: pnpm prisma generate
      env:
        DATABASE_URL: "postgresql://cicd_admin:testpassword123@localhost:5432/hockey_test_db?schema=public"
        DIRECT_URL: "postgresql://cicd_admin:testpassword123@localhost:5432/hockey_test_db?schema=public"

    - name: Initialize Database Schema (Push to Test DB)
      # Genera las tablas en el contenedor PostgreSQL efímero usando el schema.prisma
      run: pnpm prisma db push
      env:
        DATABASE_URL: "postgresql://cicd_admin:testpassword123@localhost:5432/hockey_test_db?schema=public"
        DIRECT_URL: "postgresql://cicd_admin:testpassword123@localhost:5432/hockey_test_db?schema=public"

    - name: Run e2e Tests (Optional)
      # Ejecuta las pruebas contra la API Graphql simulando un cliente HTTP real
      run: npx jest --config ./test/jest-e2e.json || echo "No e2e tests found yet. Skipping..."
